name: Scheduled GitHub → Google Drive Backup

on:
  # schedule:
  #   # Runs daily at 02:00 UTC — adjust to your preferred time
  #   - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      incremental:
        description: 'Only back up repos changed since last session'
        required: false
        default: 'false'
        type: boolean
      incremental_mode:
        description: 'Archive strategy: full (zip) or delta (git bundle, upload only new objects)'
        required: false
        default: 'full'
        type: choice
        options: ['full', 'delta']
      repos:
        description: 'Comma-separated list of repos to back up (leave blank for all)'
        required: false
        default: ''
      include:
        description: 'What to include (comma-separated: code,issues,pull_requests,releases,wiki,labels,milestones,config)'
        required: false
        default: 'code,issues,pull_requests,releases,wiki,labels,milestones'
      orgs:
        description: 'Comma-separated list of GitHub orgs to also back up (leave blank to skip)'
        required: false
        default: ''
      storage_target:
        description: 'Storage target: drive, s3, azure, or b2'
        required: false
        default: 'drive'
      include_sbom:
        description: 'Generate SBOM for this repo (true/false)'
        required: false
        default: 'false'
        type: boolean
      runner:
        description: 'Runner label'
        required: false
        default: 'ubuntu-latest'
      gitlab_token:
        description: 'GitLab personal access token (optional)'
        required: false
        default: ''
      gitlab_host:
        description: 'GitLab host URL'
        required: false
        default: 'https://gitlab.com'

jobs:
  backup:
    runs-on: ${{ github.event.inputs.runner || 'ubuntu-latest' }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Write Google credentials
        env:
          GOOGLE_CLIENT_SECRET_JSON: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN }}
        run: |
          mkdir -p credentials
          printf '%s' "$GOOGLE_CLIENT_SECRET_JSON" > credentials/google-client-secret.json
          printf '%s' "$GOOGLE_TOKEN_JSON"         > credentials/google-token.json
          node -e "
            ['credentials/google-client-secret.json','credentials/google-token.json'].forEach(f=>{
              const raw=require('fs').readFileSync(f,'utf8');
              const obj=JSON.parse(raw.trim().match(/^\{[\s\S]*\}/)[0]);
              require('fs').writeFileSync(f,JSON.stringify(obj));
            });
            console.log('Credentials sanitized');
          "

      - name: Run backup
        env:
          GITHUB_TOKEN:              ${{ secrets.GH_BACKUP_TOKEN }}
          GITHUB_USER:               ${{ secrets.GH_USER }}
          GDRIVE_FOLDER_ID:          ${{ secrets.GDRIVE_FOLDER_ID }}
          GOOGLE_CLIENT_SECRET_PATH: ./credentials/google-client-secret.json
          GOOGLE_TOKEN_PATH:         ./credentials/google-token.json
          BACKUP_INCLUDE:            ${{ github.event.inputs.include || 'code,issues,pull_requests,releases,wiki,labels,milestones' }}
          INCREMENTAL:               ${{ github.event.inputs.incremental || 'false' }}
          INCREMENTAL_MODE:          ${{ github.event.inputs.incremental_mode || 'full' }}
          BACKUP_CONCURRENCY:        '3'
          BACKUP_TMP_DIR:            /tmp/gh-backup
          REPOS:                     ${{ github.event.inputs.repos }}
          GITHUB_ORGS:               ${{ github.event.inputs.orgs }}
          STORAGE_TARGET:            ${{ github.event.inputs.storage_target || 'drive' }}
          GITLAB_TOKEN:              ${{ github.event.inputs.gitlab_token }}
          GITLAB_HOST:               ${{ github.event.inputs.gitlab_host || 'https://gitlab.com' }}
          BACKUP_ENCRYPTION_KEY:     ${{ secrets.BACKUP_ENCRYPTION_KEY }}
        run: |
          if [ -n "$REPOS" ]; then
            node -e "
              const { runBackup } = require('./src/backup/index');
              runBackup({ repos: process.env.REPOS.split(',').map(r => r.trim()) })
                .then(s => { console.log(JSON.stringify(s, null, 2)); process.exit(s.failed > 0 ? 1 : 0); })
                .catch(e => { console.error(e); process.exit(1); });
            "
          else
            node src/backup/index.js
          fi

      - name: Run npm audit on backed-up Node repos
        if: success()
        continue-on-error: true
        env:
          BACKUP_TMP_DIR: /tmp/gh-backup
        run: |
          find /tmp/gh-backup -name "package.json" -not -path "*/node_modules/*" | head -20 | while read pj; do
            dir=$(dirname "$pj")
            repo=$(basename "$dir")
            npm audit --json --prefix "$dir" > "/tmp/gh-backup/${repo}.audit.json" 2>/dev/null || true
          done

      - name: Generate SBOM
        if: success() && github.event.inputs.include_sbom == 'true'
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          artifact-name: sbom-${{ github.run_id }}.spdx.json

      - name: Check for PAT expiry
        if: failure()
        run: |
          if [ -f /tmp/pat-expired ]; then
            echo "PAT_EXPIRED=true" >> $GITHUB_ENV
          fi

      - name: Alert on PAT expiry via Teams
        if: failure() && env.PAT_EXPIRED == 'true'
        continue-on-error: true
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then exit 0; fi
          curl -s -X POST "$TEAMS_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"type\": \"message\",
              \"attachments\": [{
                \"contentType\": \"application/vnd.microsoft.card.adaptive\",
                \"content\": {
                  \"\$schema\": \"http://adaptivecards.io/schemas/adaptive-card.json\",
                  \"type\": \"AdaptiveCard\",
                  \"version\": \"1.4\",
                  \"body\": [
                    {\"type\":\"TextBlock\",\"text\":\"🔑 GitHub PAT Has Expired\",\"weight\":\"Bolder\",\"size\":\"Medium\",\"color\":\"Attention\"},
                    {\"type\":\"TextBlock\",\"text\":\"Backups are failing because the GitHub Personal Access Token (GH_BACKUP_TOKEN) has expired.\",\"wrap\":true},
                    {\"type\":\"TextBlock\",\"text\":\"Renew: GitHub → Settings → Developer Settings → Personal Access Tokens\",\"wrap\":true,\"color\":\"Accent\"},
                    {\"type\":\"ActionSet\",\"actions\":[{\"type\":\"Action.OpenUrl\",\"title\":\"View Failed Run\",\"url\":\"$RUN_URL\"}]}
                  ]
                }
              }]
            }"

      - name: Update status - token expired
        if: failure() && env.PAT_EXPIRED == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const content = JSON.stringify({
              status: 'token-expired',
              last_run: new Date().toISOString(),
              run_url: context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId
            });
            const encoded = Buffer.from(content).toString('base64');
            let sha;
            try {
              const res = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'docs/status.json'
              });
              sha = res.data.sha;
            } catch (_) {}
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'docs/status.json',
              message: 'chore: update backup status [skip ci]',
              content: encoded,
              ...(sha ? { sha } : {})
            });

      - name: Update status badge
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const content = JSON.stringify({
              status: 'passing',
              last_run: new Date().toISOString(),
              run_url: context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId
            });
            const encoded = Buffer.from(content).toString('base64');
            let sha;
            try {
              const res = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'docs/status.json'
              });
              sha = res.data.sha;
            } catch (_) {}
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'docs/status.json',
              message: 'chore: update backup status [skip ci]',
              content: encoded,
              ...(sha ? { sha } : {})
            });

      - name: Send webhook notification
        if: always()
        continue-on-error: true
        env:
          WEBHOOK_URL: ${{ secrets.BACKUP_WEBHOOK_URL }}
          CONCLUSION: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -n "$WEBHOOK_URL" ]; then
            curl -s -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"event\":\"backup_complete\",\"status\":\"$CONCLUSION\",\"run_url\":\"$RUN_URL\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"
          fi

      - name: Append audit log entry
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const conclusion = context.job === 'backup' ? '${{ job.status }}' : 'unknown';
            const runUrl = context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId;
            const line = `${new Date().toISOString()} | backup | conclusion=${conclusion} | run=${runUrl}\n`;
            let existing = '';
            let sha;
            try {
              const res = await github.rest.repos.getContent({
                owner: context.repo.owner, repo: context.repo.repo, path: 'docs/audit.log'
              });
              sha = res.data.sha;
              existing = Buffer.from(res.data.content, 'base64').toString('utf8');
            } catch (_) {}
            const updated = existing + line;
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner, repo: context.repo.repo,
              path: 'docs/audit.log',
              message: 'chore: audit log [skip ci]',
              content: Buffer.from(updated).toString('base64'),
              ...(sha ? { sha } : {})
            });

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backup-logs-${{ github.run_id }}
          path: |
            logs/
            /tmp/gh-backup/*.audit.json
          retention-days: 30
          if-no-files-found: ignore
