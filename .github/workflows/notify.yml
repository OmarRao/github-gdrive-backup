name: Backup Failure Notification

on:
  workflow_run:
    workflows: ["Scheduled GitHub → Google Drive Backup"]
    types: [completed]

jobs:
  notify:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ GitHub backup failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Backup failed* on `${{ github.event.workflow_run.head_branch }}`\nRun: <${{ github.event.workflow_run.html_url }}|#${{ github.event.workflow_run.run_number }}>\nStarted: ${{ github.event.workflow_run.created_at }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Send email notification
        if: ${{ secrets.NOTIFY_EMAIL != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.NOTIFY_EMAIL }}
          password: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          subject: "[GH Backup] Backup failed — Run #${{ github.event.workflow_run.run_number }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: GH Backup <${{ secrets.NOTIFY_EMAIL }}>
          body: |
            Your GitHub → Google Drive backup failed.

            Run: #${{ github.event.workflow_run.run_number }}
            Branch: ${{ github.event.workflow_run.head_branch }}
            Started: ${{ github.event.workflow_run.created_at }}

            View the run: ${{ github.event.workflow_run.html_url }}

      - name: Update status badge
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'docs/status.json',
              message: 'chore: update backup status badge',
              content: Buffer.from(JSON.stringify({
                status: 'failing',
                last_run: new Date().toISOString(),
                run_url: context.payload.workflow_run.html_url
              })).toString('base64'),
              sha: await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'docs/status.json'
              }).then(r => r.data.sha).catch(() => undefined)
            });
