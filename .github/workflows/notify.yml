name: Backup Failure Notification

on:
  workflow_run:
    workflows: ["Scheduled GitHub → Google Drive Backup"]
    types: [completed]

jobs:
  notify:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"GitHub backup failed: $RUN_URL\"}"

      - name: Update status badge
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const payload = context.payload.workflow_run;
            const content = JSON.stringify({
              status: 'failing',
              last_run: new Date().toISOString(),
              run_url: payload.html_url
            });
            const encoded = Buffer.from(content).toString('base64');
            let sha;
            try {
              const res = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'docs/status.json'
              });
              sha = res.data.sha;
            } catch (_) {}
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'docs/status.json',
              message: 'chore: update backup status [skip ci]',
              content: encoded,
              ...(sha ? { sha } : {})
            });
