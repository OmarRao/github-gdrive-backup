name: CI — Build, Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-lint-test:
    name: Build · Lint · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify copyright headers
        run: |
          echo "Checking copyright headers in src/**/*.js ..."
          missing=0
          while IFS= read -r -d '' file; do
            if ! grep -q "Copyright (c) Omar Rao" "$file"; then
              echo "  MISSING header: $file"
              missing=$((missing + 1))
            fi
          done < <(find src -name "*.js" -print0)
          if [ "$missing" -gt 0 ]; then
            echo "ERROR: $missing file(s) missing copyright header."
            exit 1
          fi
          echo "All source files have copyright headers."

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Validate workflow YAML files
        run: |
          pip install yamllint --quiet
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}}}" .github/workflows/
          echo "All workflow YAML files are valid."

      - name: Check for secrets in source
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  provenance:
    name: SBOM & Build Provenance
    needs: build-lint-test
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write        # required for signing the attestation
      attestations: write    # required to record the attestation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest build provenance for the SBOM
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.spdx.json
          retention-days: 90
