name: CI — Build, Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-lint-test:
    name: Build · Lint · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify copyright headers
        run: |
          echo "Checking copyright headers in src/**/*.js ..."
          missing=0
          while IFS= read -r -d '' file; do
            if ! grep -q "Copyright (c) Omar Rao" "$file"; then
              echo "  MISSING header: $file"
              missing=$((missing + 1))
            fi
          done < <(find src -name "*.js" -print0)
          if [ "$missing" -gt 0 ]; then
            echo "ERROR: $missing file(s) missing copyright header."
            exit 1
          fi
          echo "All source files have copyright headers."

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Validate workflow YAML files
        run: |
          pip install yamllint --quiet
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}}}" .github/workflows/
          echo "All workflow YAML files are valid."

      - name: Check for secrets in source
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
