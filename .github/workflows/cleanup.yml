name: Cleanup Old Backup Sessions

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      retention_days:
        description: 'Delete sessions older than N days'
        required: false
        default: '90'
      runner:
        description: 'Runner label'
        required: false
        default: 'ubuntu-latest'

jobs:
  cleanup:
    runs-on: ${{ github.event.inputs.runner || 'ubuntu-latest' }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Write Google credentials
        env:
          GOOGLE_CLIENT_SECRET_JSON: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN }}
        run: |
          mkdir -p credentials
          printf '%s' "$GOOGLE_CLIENT_SECRET_JSON" > credentials/google-client-secret.json
          printf '%s' "$GOOGLE_TOKEN_JSON"         > credentials/google-token.json

      - name: Run cleanup
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GOOGLE_CLIENT_SECRET_PATH: ./credentials/google-client-secret.json
          GOOGLE_TOKEN_PATH: ./credentials/google-token.json
          RETENTION_DAYS: ${{ github.event.inputs.retention_days || '90' }}
        run: node src/cleanup/index.js

      - name: Commit weekly digest
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const retentionDays = process.env.RETENTION_DAYS || '90';
            const date = new Date().toISOString().slice(0, 10);

            // Parse cleanup log if available
            let deleted = 'N/A', kept = 'N/A';
            const logDir = 'logs';
            if (fs.existsSync(logDir)) {
              const logs = fs.readdirSync(logDir).filter(f => f.startsWith('cleanup-'));
              if (logs.length) {
                const latest = logs.sort().pop();
                const content = fs.readFileSync(`${logDir}/${latest}`, 'utf8');
                const m = content.match(/Cleanup complete\. Deleted: (\d+), Kept: (\d+)/);
                if (m) { deleted = m[1]; kept = m[2]; }
              }
            }

            const digest = `# Cleanup Digest — ${date}\n\n` +
              `**Date:** ${date}\n` +
              `**Retention policy:** ${retentionDays} days\n` +
              `**Sessions deleted:** ${deleted}\n` +
              `**Sessions kept:** ${kept}\n`;

            const encoded = Buffer.from(digest).toString('base64');
            let sha;
            try {
              const res = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'docs/digest-latest.md'
              });
              sha = res.data.sha;
            } catch (_) {}
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'docs/digest-latest.md',
              message: 'chore: update cleanup digest [skip ci]',
              content: encoded,
              ...(sha ? { sha } : {})
            });
        env:
          RETENTION_DAYS: ${{ github.event.inputs.retention_days || '90' }}

      - name: Upload cleanup log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cleanup-log-${{ github.run_number }}
          path: logs/cleanup-*.log
          retention-days: 7
          if-no-files-found: ignore
