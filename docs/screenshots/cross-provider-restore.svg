<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" width="900" height="430" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="430" fill="#f8fafc"/>
  <text x="32" y="42" font-size="18" font-weight="800" fill="#0f172a">Cross-Provider Restore</text>
  <text x="32" y="64" font-size="13" fill="#64748b">The archived git mirror carries full history — restore it to any git host. DR portability, not vendor lock-in.</text>

  <!-- Source: Drive session -->
  <rect x="32" y="120" width="180" height="150" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="56" y="156" font-size="24">📁</text>
  <text x="92" y="152" font-size="13.5" font-weight="700" fill="#0f172a">Google Drive</text>
  <text x="56" y="184" font-size="11.5" fill="#64748b">backup session</text>
  <text x="56" y="206" font-size="11" fill="#94a3b8">• repo.zip (mirror)</text>
  <text x="56" y="224" font-size="11" fill="#94a3b8">• metadata.json</text>
  <text x="56" y="242" font-size="11" fill="#94a3b8">• manifest.json</text>

  <!-- Restore engine -->
  <rect x="290" y="120" width="200" height="150" rx="12" fill="#0f172a"/>
  <text x="390" y="152" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">Restore Engine</text>
  <text x="390" y="176" text-anchor="middle" font-size="11" fill="#94a3b8">download · verify SHA-256</text>
  <text x="390" y="194" text-anchor="middle" font-size="11" fill="#94a3b8">decrypt · extract mirror</text>
  <text x="390" y="218" text-anchor="middle" font-size="11.5" fill="#4ade80">provider abstraction</text>
  <text x="390" y="238" text-anchor="middle" font-size="10.5" fill="#64748b">ensureRepo · remoteUrl</text>
  <text x="390" y="254" text-anchor="middle" font-size="10.5" fill="#64748b">labels · milestones</text>

  <line x1="212" y1="195" x2="286" y2="195" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Destinations -->
  <!-- GitHub -->
  <rect x="600" y="96" width="270" height="82" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="624" y="138" font-size="22">🐙</text>
  <text x="660" y="128" font-size="13.5" font-weight="700" fill="#0f172a">GitHub (default)</text>
  <text x="660" y="150" font-size="11" fill="#64748b">RESTORE_TARGET_PROVIDER=github</text>
  <line x1="490" y1="180" x2="596" y2="140" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar)"/>

  <!-- GitLab -->
  <rect x="600" y="188" width="270" height="82" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="624" y="230" font-size="22">🦊</text>
  <text x="660" y="220" font-size="13.5" font-weight="700" fill="#0f172a">GitLab (SaaS / self-hosted)</text>
  <text x="660" y="242" font-size="11" fill="#64748b">RESTORE_TARGET_PROVIDER=gitlab</text>
  <line x1="490" y1="200" x2="596" y2="222" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Gitea -->
  <rect x="600" y="280" width="270" height="82" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="624" y="322" font-size="22">🍵</text>
  <text x="660" y="312" font-size="13.5" font-weight="700" fill="#0f172a">Gitea (self-hosted)</text>
  <text x="660" y="334" font-size="11" fill="#64748b">RESTORE_TARGET_PROVIDER=gitea</text>
  <line x1="490" y1="215" x2="596" y2="312" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar)"/>

  <text x="32" y="316" font-size="11.5" fill="#475569" font-weight="600">Transfers:</text>
  <text x="32" y="336" font-size="11" fill="#64748b">✓ all branches + tags</text>
  <text x="32" y="354" font-size="11" fill="#64748b">✓ labels + milestones (best-effort)</text>
  <text x="32" y="372" font-size="11" fill="#94a3b8">issues/PRs kept in metadata.json</text>
</svg>
