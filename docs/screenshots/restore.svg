  <text x="328" y="170" font-size="10" fill="#6b7280">2026-06-16 02:00 UTC  -  12 repos  -  847 MB</text>
  <line x1="276" y1="196" x2="666" y2="196" stroke="#e2e6ea" stroke-width="1"/>

