  <text x="328" y="234" font-size="10" fill="#6b7280">2026-06-15 02:00 UTC  -  12 repos  -  831 MB</text>
  <line x1="276" y1="248" x2="666" y2="248" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Session 3 -->
  <rect x="296" y="260" width="22" height="18" rx="2" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="328" y="271" font-size="11" font-weight="500" fill="#111827">backup-2026-06-14T02-00-00-000Z</text>
  <text x="328" y="286" font-size="10" fill="#6b7280">2026-06-14 02:00 UTC  -  12 repos  -  829 MB</text>
  <line x1="276" y1="300" x2="666" y2="300" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Session 4 -->
  <rect x="296" y="312" width="22" height="18" rx="2" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="328" y="323" font-size="11" font-weight="500" fill="#111827">backup-2026-06-13T02-00-00-000Z</text>
  <text x="328" y="338" font-size="10" fill="#6b7280">2026-06-13 02:00 UTC  -  11 repos  -  802 MB</text>
  <line x1="276" y1="352" x2="666" y2="352" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Session 5 -->
  <rect x="296" y="364" width="22" height="18" rx="2" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="328" y="375" font-size="11" font-weight="500" fill="#111827">backup-2026-06-12T02-00-00-000Z</text>
  <text x="328" y="390" font-size="10" fill="#6b7280">2026-06-12 02:00 UTC  -  11 repos  -  798 MB</text>

