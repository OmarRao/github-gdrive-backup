<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 680" width="1100" height="680">
  <!-- Window background -->
  <rect width="1100" height="680" fill="#e8eaed" rx="8"/>

  <!-- Browser chrome -->
  <rect x="0" y="0" width="1100" height="36" fill="#dee1e6" rx="8"/>
  <rect x="0" y="26" width="1100" height="10" fill="#dee1e6"/>
  <circle cx="18" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="36" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="54" cy="18" r="6" fill="#27c93f"/>
  <rect x="200" y="8" width="700" height="20" fill="#f0f2f5" rx="10"/>
  <text x="550" y="22" font-family="ui-monospace,monospace" font-size="11" fill="#57606a" text-anchor="middle">omarrao.github.io/github-gdrive-backup/</text>

  <!-- Page background -->
  <rect x="0" y="36" width="1100" height="644" fill="#f6f8fa"/>

  <!-- Sidebar -->
  <rect x="0" y="36" width="230" height="644" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="16" y="72" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="700" fill="#24292f">🗄️ GH→Drive Backup</text>

  <!-- Nav: Dashboard -->
  <text x="18" y="110" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#57606a">⊞</text>
  <text x="36" y="110" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#57606a">Dashboard</text>

  <!-- Backup -->
  <text x="18" y="144" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#57606a">☁</text>
  <text x="36" y="144" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#57606a">Backup</text>

  <!-- Restore (active) -->
  <rect x="8" y="154" width="214" height="34" fill="#0969da" rx="6"/>
  <text x="18" y="176" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#ffffff">↺</text>
  <text x="36" y="176" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="600" fill="#ffffff">Restore</text>

  <!-- Workflow Runs -->
  <text x="18" y="216" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#57606a">▶</text>
  <text x="36" y="216" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#57606a">Workflow Runs</text>

  <!-- Settings -->
  <text x="18" y="250" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#57606a">⚙</text>
  <text x="36" y="250" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#57606a">Settings</text>

  <!-- Sidebar footer -->
  <line x1="0" y1="642" x2="230" y2="642" stroke="#d0d7de" stroke-width="1"/>
  <text x="14" y="657" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="9" fill="#8b949e">Built by Omar Rao</text>
  <text x="14" y="670" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="9" fill="#8b949e">Engineer — Data Resilience, Cybersecurity &amp; Privacy</text>

  <!-- Page title -->
  <text x="258" y="68" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="20" font-weight="700" fill="#24292f">Restore Drive → GitHub</text>

  <!-- Left card: Backup Sessions -->
  <rect x="246" y="84" width="438" height="532" fill="#ffffff" stroke="#d0d7de" stroke-width="1" rx="6"/>
  <text x="266" y="112" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" font-weight="600" fill="#24292f">Backup Sessions — from Google Drive</text>
  <text x="266" y="130" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#57606a">Click a session to select it for restore</text>

  <!-- Session 1 (selected / highlighted) -->
  <rect x="258" y="140" width="414" height="62" fill="#ddf4ff" stroke="#0969da" stroke-width="1.5" rx="6"/>
  <text x="274" y="163" font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#0969da">backup-2026-06-15T02-00-00-000Z</text>
  <rect x="274" y="170" width="50" height="16" fill="#dafbe1" rx="8"/>
  <text x="299" y="181" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="9" font-weight="600" fill="#1a7f37" text-anchor="middle">● latest</text>
  <text x="336" y="181" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#57606a">Today · 12 repos · 284 MB</text>

  <!-- Session 2 -->
  <rect x="258" y="212" width="414" height="62" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1" rx="6"/>
  <text x="274" y="235" font-family="ui-monospace,monospace" font-size="11" fill="#24292f">backup-2026-06-14T02-00-00-000Z</text>
  <text x="274" y="255" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#57606a">1 day ago · 12 repos · 281 MB</text>

  <!-- Session 3 -->
  <rect x="258" y="284" width="414" height="62" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1" rx="6"/>
  <text x="274" y="307" font-family="ui-monospace,monospace" font-size="11" fill="#24292f">backup-2026-06-13T02-00-00-000Z</text>
  <text x="274" y="327" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#57606a">2 days ago · 11 repos · 270 MB</text>

  <!-- Session 4 -->
  <rect x="258" y="356" width="414" height="62" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1" rx="6"/>
  <text x="274" y="379" font-family="ui-monospace,monospace" font-size="11" fill="#24292f">backup-2026-06-12T02-00-00-000Z</text>
  <text x="274" y="399" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#57606a">3 days ago · 12 repos · 280 MB</text>

  <!-- Session 5 -->
  <rect x="258" y="428" width="414" height="62" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1" rx="6"/>
  <text x="274" y="451" font-family="ui-monospace,monospace" font-size="11" fill="#24292f">backup-2026-06-11T02-00-00-000Z</text>
  <text x="274" y="471" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#57606a">4 days ago · 12 repos · 278 MB</text>

  <!-- Right card: Restore Options -->
  <rect x="698" y="84" width="386" height="532" fill="#ffffff" stroke="#d0d7de" stroke-width="1" rx="6"/>
  <text x="718" y="112" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" font-weight="600" fill="#24292f">Restore Options</text>

  <!-- Selected session badge -->
  <rect x="718" y="120" width="346" height="36" fill="#ddf4ff" stroke="#0969da" stroke-width="1" rx="6"/>
  <text x="728" y="133" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#57606a">Selected session:</text>
  <text x="728" y="148" font-family="ui-monospace,monospace" font-size="10" font-weight="600" fill="#0969da">backup-2026-06-15T02-00-00-000Z</text>

  <!-- Repos input -->
  <text x="718" y="182" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="600" fill="#57606a">Repositories to restore</text>
  <text x="718" y="198" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#8b949e">Leave blank to restore all repos</text>
  <rect x="718" y="206" width="346" height="30" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1" rx="6"/>
  <text x="732" y="225" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#8b949e">e.g. repo1,repo2  (blank = all)</text>

  <!-- Target owner input -->
  <text x="718" y="258" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="600" fill="#57606a">Target GitHub owner</text>
  <rect x="718" y="266" width="346" height="30" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1" rx="6"/>
  <text x="732" y="285" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#24292f">OmarRao</text>

  <!-- Private checkbox -->
  <rect x="718" y="314" width="12" height="12" fill="#0969da" rx="2"/>
  <text x="736" y="325" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#24292f">Restore as private repositories</text>
  <text x="736" y="342" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#57606a">Repos will be created private by default</text>

  <!-- Divider -->
  <line x1="698" y1="362" x2="1084" y2="362" stroke="#d0d7de" stroke-width="1"/>

  <!-- Restore button (orange) -->
  <rect x="718" y="378" width="346" height="42" fill="#bf4700" rx="6"/>
  <text x="891" y="404" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">↺  Trigger Restore Workflow</text>

  <text x="718" y="440" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#57606a">Fires restore.yml via GitHub Actions API.</text>
  <text x="718" y="456" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#57606a">Repos are created if they do not exist.</text>
</svg>
