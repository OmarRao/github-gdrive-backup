<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="topbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="900" height="500" fill="#f8fafc"/>
  <rect x="0" y="0" width="900" height="4" fill="url(#topbar)"/>
  <rect x="0" y="4" width="900" height="44" fill="#ffffff"/>
  <text x="28" y="32" font-size="12" fill="#64748b">Backup</text>
  <text x="100" y="32" font-size="12" fill="#64748b">Restore</text>
  <text x="177" y="32" font-size="14" font-weight="700" fill="#1e293b">Reports</text>
  <text x="265" y="32" font-size="12" fill="#64748b">Settings</text>
  <circle cx="858" cy="26" r="12" fill="#2563eb"/>
  <text x="858" y="30" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">OR</text>
  <line x1="0" y1="48" x2="900" y2="48" stroke="#e2e8f0"/>

  <!-- stat cards row -->
  <rect x="28" y="64" width="200" height="74" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="46" y="90" font-size="11" fill="#64748b">Total Backups</text>
  <text x="46" y="120" font-size="24" font-weight="700" fill="#1e293b">47</text>

  <rect x="240" y="64" width="200" height="74" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="258" y="90" font-size="11" fill="#64748b">Success Rate</text>
  <text x="258" y="120" font-size="24" font-weight="700" fill="#16a34a">97.9%</text>

  <rect x="452" y="64" width="200" height="74" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="470" y="90" font-size="11" fill="#64748b">Failed</text>
  <text x="470" y="120" font-size="24" font-weight="700" fill="#dc2626">1</text>

  <rect x="664" y="64" width="208" height="74" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="682" y="90" font-size="11" fill="#64748b">Streak</text>
  <text x="682" y="120" font-size="24" font-weight="700" fill="#1e293b">8 days</text>

  <!-- Bar chart card -->
  <rect x="28" y="152" width="540" height="232" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="48" y="180" font-size="13" font-weight="700" fill="#1e293b">Backup Size Over Time</text>
  <line x1="48" y1="350" x2="548" y2="350" stroke="#e2e8f0"/>
  <g fill="#2563eb">
    <rect x="62" y="280" width="40" height="70" rx="4"/>
    <rect x="122" y="250" width="40" height="100" rx="4"/>
    <rect x="182" y="220" width="40" height="130" rx="4"/>
    <rect x="242" y="240" width="40" height="110" rx="4"/>
    <rect x="302" y="200" width="40" height="150" rx="4"/>
    <rect x="362" y="210" width="40" height="140" rx="4"/>
    <rect x="422" y="185" width="40" height="165" rx="4"/>
    <rect x="482" y="195" width="40" height="155" rx="4" fill="#7c3aed"/>
  </g>
  <g font-size="9" fill="#64748b" text-anchor="middle">
    <text x="82" y="366">Mon</text>
    <text x="142" y="366">Tue</text>
    <text x="202" y="366">Wed</text>
    <text x="262" y="366">Thu</text>
    <text x="322" y="366">Fri</text>
    <text x="382" y="366">Sat</text>
    <text x="442" y="366">Sun</text>
    <text x="502" y="366">Mon</text>
  </g>

  <!-- sparkline cards -->
  <rect x="584" y="152" width="288" height="70" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="600" y="176" font-size="11" fill="#64748b">Size</text>
  <text x="600" y="206" font-size="16" font-weight="700" fill="#1e293b">412 MB</text>
  <polyline points="720,205 740,200 760,208 780,190 800,195 820,182 840,178 860,185" fill="none" stroke="#2563eb" stroke-width="2"/>

  <rect x="584" y="232" width="288" height="70" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="600" y="256" font-size="11" fill="#64748b">Duration</text>
  <text x="600" y="286" font-size="16" font-weight="700" fill="#1e293b">3m 42s</text>
  <polyline points="720,288 740,280 760,285 780,278 800,272 820,276 840,268 860,264" fill="none" stroke="#16a34a" stroke-width="2"/>

  <rect x="584" y="312" width="288" height="70" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="600" y="336" font-size="11" fill="#64748b">Success Rate</text>
  <text x="600" y="366" font-size="16" font-weight="700" fill="#16a34a">97.9%</text>
  <polyline points="720,368 740,362 760,366 780,358 800,360 820,352 840,350 860,348" fill="none" stroke="#7c3aed" stroke-width="2"/>

  <!-- Export button -->
  <rect x="28" y="404" width="844" height="44" rx="8" fill="#2563eb"/>
  <text x="450" y="431" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Export Compliance Report</text>
</svg>
