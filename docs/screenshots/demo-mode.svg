<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="topbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="900" height="500" fill="#f8fafc"/>

  <!-- yellow demo banner -->
  <rect x="0" y="0" width="900" height="36" fill="#fffbeb"/>
  <line x1="0" y1="36" x2="900" y2="36" stroke="#fde68a"/>
  <!-- warning triangle -->
  <g transform="translate(14,9)">
    <path d="M8 0 L16 14 H0 Z" fill="#d97706"/>
    <rect x="7" y="5" width="2" height="5" rx="1" fill="#ffffff"/>
    <circle cx="8" cy="12" r="1.1" fill="#ffffff"/>
  </g>
  <text x="36" y="23" font-size="12" font-weight="600" fill="#92400e">Demo Mode — viewing sample data. Sign in to connect your real accounts.</text>

  <!-- colored top bar -->
  <rect x="0" y="36" width="900" height="4" fill="url(#topbar)"/>
  <!-- header -->
  <rect x="0" y="40" width="900" height="44" fill="#ffffff"/>
  <text x="28" y="68" font-size="14" font-weight="700" fill="#1e293b">Dashboard</text>
  <rect x="752" y="52" width="120" height="22" rx="6" fill="#fef3c7"/>
  <text x="812" y="67" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">Sample Data</text>
  <line x1="0" y1="84" x2="900" y2="84" stroke="#e2e8f0"/>

  <!-- stat cards -->
  <rect x="28" y="100" width="200" height="74" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="42" y="114" width="44" height="44" rx="10" fill="#dbeafe"/>
  <!-- box icon -->
  <g transform="translate(52,124)" fill="none" stroke="#2563eb" stroke-width="1.8" stroke-linejoin="round">
    <path d="M12 1 L23 6 L12 11 L1 6 Z"/>
    <path d="M1 6 V18 L12 23 V11"/>
    <path d="M23 6 V18 L12 23"/>
  </g>
  <text x="98" y="126" font-size="11" fill="#64748b">Repositories</text>
  <text x="98" y="150" font-size="22" font-weight="700" fill="#1e293b">5</text>

  <rect x="240" y="100" width="200" height="74" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="254" y="114" width="44" height="44" rx="10" fill="#ede9fe"/>
  <!-- refresh icon -->
  <g transform="translate(264,124)" fill="none" stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round">
    <path d="M21 12 a9 9 0 1 1 -3 -6.7"/>
    <path d="M21 3 V6 H18" stroke-linejoin="round"/>
  </g>
  <text x="310" y="126" font-size="11" fill="#64748b">Backup Sessions</text>
  <text x="310" y="150" font-size="22" font-weight="700" fill="#1e293b">47</text>

  <rect x="452" y="100" width="200" height="74" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="466" y="114" width="44" height="44" rx="10" fill="#dcfce7"/>
  <!-- check icon -->
  <circle cx="488" cy="136" r="11" fill="#16a34a"/>
  <path d="M483 136 l3.5 3.5 l6 -7" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="522" y="126" font-size="11" fill="#64748b">Last Backup</text>
  <text x="522" y="150" font-size="19" font-weight="700" fill="#1e293b">2h ago</text>

  <rect x="664" y="100" width="208" height="74" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="678" y="114" width="44" height="44" rx="10" fill="#fef3c7"/>
  <!-- lightning icon -->
  <path d="M703 124 l-9 14 h7 l-2 10 l9 -14 h-7 z" fill="#d97706"/>
  <text x="734" y="126" font-size="11" fill="#64748b">Active Runs</text>
  <text x="734" y="150" font-size="22" font-weight="700" fill="#1e293b">0</text>

  <!-- repos table -->
  <rect x="28" y="188" width="844" height="288" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="48" y="216" font-size="13" font-weight="700" fill="#1e293b">Recent Workflow Runs</text>
  <line x1="48" y1="230" x2="852" y2="230" stroke="#e2e8f0"/>
  <!-- column headers -->
  <text x="48" y="252" font-size="10" font-weight="600" fill="#64748b">REPOSITORY</text>
  <text x="560" y="252" font-size="10" font-weight="600" fill="#64748b">STATUS</text>
  <text x="852" y="252" text-anchor="end" font-size="10" font-weight="600" fill="#64748b">LAST RUN</text>

  <!-- rows -->
  <g font-size="12">
    <circle cx="56" cy="282" r="5" fill="#16a34a"/>
    <text x="72" y="286" font-weight="600" fill="#1e293b">webapp-frontend</text>
    <text x="560" y="286" fill="#16a34a">success</text>
    <text x="852" y="286" text-anchor="end" fill="#64748b">2h ago</text>
    <line x1="48" y1="300" x2="852" y2="300" stroke="#e2e8f0"/>

    <circle cx="56" cy="326" r="5" fill="#16a34a"/>
    <text x="72" y="330" font-weight="600" fill="#1e293b">api-service</text>
    <text x="560" y="330" fill="#16a34a">success</text>
    <text x="852" y="330" text-anchor="end" fill="#64748b">1d ago</text>
    <line x1="48" y1="344" x2="852" y2="344" stroke="#e2e8f0"/>

    <circle cx="56" cy="370" r="5" fill="#16a34a"/>
    <text x="72" y="374" font-weight="600" fill="#1e293b">mobile-app</text>
    <text x="560" y="374" fill="#16a34a">success</text>
    <text x="852" y="374" text-anchor="end" fill="#64748b">3d ago</text>
    <line x1="48" y1="388" x2="852" y2="388" stroke="#e2e8f0"/>

    <circle cx="56" cy="414" r="5" fill="#16a34a"/>
    <text x="72" y="418" font-weight="600" fill="#1e293b">infrastructure</text>
    <text x="560" y="418" fill="#16a34a">success</text>
    <text x="852" y="418" text-anchor="end" fill="#64748b">5d ago</text>
    <line x1="48" y1="432" x2="852" y2="432" stroke="#e2e8f0"/>

    <circle cx="56" cy="458" r="5" fill="#dc2626"/>
    <text x="72" y="462" font-weight="600" fill="#1e293b">data-pipeline</text>
    <text x="560" y="462" fill="#dc2626">failure · 401</text>
    <text x="852" y="462" text-anchor="end" fill="#64748b">2d ago</text>
  </g>
</svg>
