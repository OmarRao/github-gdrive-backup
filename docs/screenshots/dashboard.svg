<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="topbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="loginbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <!-- LEFT HALF: login -->
  <rect x="0" y="0" width="450" height="500" fill="url(#loginbg)"/>
  <rect x="95" y="115" width="260" height="285" rx="12" fill="#ffffff"/>
  <!-- shield icon -->
  <circle cx="225" cy="165" r="27" fill="#2563eb"/>
  <path d="M225 150 l15 6 v10 c0 10 -7 16 -15 19 c-8 -3 -15 -9 -15 -19 v-10 z" fill="#ffffff"/>
  <path d="M218 166 l5 5 l9 -9" stroke="#2563eb" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="225" y="214" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">GitHub → Drive Backup</text>
  <text x="225" y="236" text-anchor="middle" font-size="11" fill="#64748b">Enterprise-grade repository backup,</text>
  <text x="225" y="251" text-anchor="middle" font-size="11" fill="#64748b">automated.</text>
  <!-- Google button -->
  <rect x="120" y="272" width="210" height="38" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <!-- Google G (4-color) -->
  <g transform="translate(139,282) scale(0.0375)">
    <path fill="#4285F4" d="M239 124c0-8-1-15-2-22H122v42h66c-3 16-12 29-25 38v32h40c24-22 36-54 36-90z"/>
    <path fill="#34A853" d="M122 245c34 0 62-11 83-30l-40-32c-11 8-26 12-43 12-33 0-61-22-71-52H10v33c21 41 63 69 112 69z"/>
    <path fill="#FBBC05" d="M51 143c-2-8-4-16-4-23s2-15 4-23V64H10C2 80-3 98-3 120s5 40 13 56l41-33z"/>
    <path fill="#EA4335" d="M122 48c19 0 35 6 48 19l36-36C184 11 156 0 122 0 73 0 31 28 10 64l41 33c10-30 38-49 71-49z"/>
  </g>
  <text x="170" y="295" font-size="12" font-weight="600" fill="#1e293b">Continue with Google</text>
  <!-- explore button -->
  <rect x="120" y="319" width="210" height="38" rx="8" fill="#ffffff" stroke="#2563eb"/>
  <text x="225" y="343" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">Explore with sample data →</text>
  <!-- lock icon -->
  <g transform="translate(170,377)">
    <rect x="0" y="4" width="11" height="8" rx="1.5" fill="#64748b"/>
    <path d="M2 4 v-2 a3.5 3.5 0 0 1 7 0 v2" stroke="#64748b" stroke-width="1.3" fill="none"/>
  </g>
  <text x="186" y="385" font-size="10" fill="#64748b">Secured by Firebase</text>

  <!-- RIGHT HALF: dashboard -->
  <rect x="450" y="0" width="450" height="500" fill="#f8fafc"/>
  <rect x="450" y="0" width="450" height="4" fill="url(#topbar)"/>
  <!-- nav header -->
  <rect x="450" y="4" width="450" height="44" fill="#ffffff"/>
  <text x="470" y="32" font-size="14" font-weight="700" fill="#1e293b">Dashboard</text>
  <circle cx="848" cy="26" r="12" fill="#2563eb"/>
  <text x="848" y="30" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">OR</text>
  <text x="828" y="30" text-anchor="end" font-size="11" font-weight="600" fill="#1e293b">Omar Rao</text>
  <line x1="450" y1="48" x2="900" y2="48" stroke="#e2e8f0"/>

  <!-- stat cards -->
  <rect x="468" y="64" width="200" height="84" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="482" y="78" width="44" height="44" rx="10" fill="#dbeafe"/>
  <!-- box icon -->
  <g transform="translate(492,88)" fill="none" stroke="#2563eb" stroke-width="1.8" stroke-linejoin="round">
    <path d="M12 1 L23 6 L12 11 L1 6 Z"/>
    <path d="M1 6 V18 L12 23 V11"/>
    <path d="M23 6 V18 L12 23"/>
  </g>
  <text x="538" y="92" font-size="11" fill="#64748b">Repositories</text>
  <text x="538" y="115" font-size="22" font-weight="700" fill="#1e293b">5</text>
  <text x="538" y="134" font-size="9" fill="#16a34a">↑ +12% vs last week</text>

  <rect x="682" y="64" width="200" height="84" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="696" y="78" width="44" height="44" rx="10" fill="#ede9fe"/>
  <!-- refresh icon -->
  <g transform="translate(706,88)" fill="none" stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round">
    <path d="M21 12 a9 9 0 1 1 -3 -6.7"/>
    <path d="M21 3 V6 H18" stroke-linejoin="round"/>
  </g>
  <text x="752" y="92" font-size="11" fill="#64748b">Backup Sessions</text>
  <text x="752" y="115" font-size="22" font-weight="700" fill="#1e293b">47</text>
  <text x="752" y="134" font-size="9" fill="#16a34a">↑ +12% vs last week</text>

  <rect x="468" y="160" width="200" height="84" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="482" y="174" width="44" height="44" rx="10" fill="#dcfce7"/>
  <!-- check icon -->
  <circle cx="504" cy="196" r="11" fill="#16a34a"/>
  <path d="M499 196 l3.5 3.5 l6 -7" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="538" y="188" font-size="11" fill="#64748b">Last Backup</text>
  <text x="538" y="211" font-size="19" font-weight="700" fill="#1e293b">2h ago</text>
  <text x="538" y="230" font-size="9" fill="#64748b">↑ +12% vs last week</text>

  <rect x="682" y="160" width="200" height="84" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="696" y="174" width="44" height="44" rx="10" fill="#fef3c7"/>
  <!-- lightning icon -->
  <path d="M721 184 l-9 14 h7 l-2 10 l9 -14 h-7 z" fill="#d97706"/>
  <text x="752" y="188" font-size="11" fill="#64748b">Active Runs</text>
  <text x="752" y="211" font-size="22" font-weight="700" fill="#1e293b">0</text>
  <text x="752" y="230" font-size="9" fill="#64748b">↑ +12% vs last week</text>

  <!-- recent runs card -->
  <rect x="468" y="258" width="414" height="216" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="486" y="284" font-size="13" font-weight="700" fill="#1e293b">Recent Workflow Runs</text>
  <line x1="486" y1="296" x2="864" y2="296" stroke="#e2e8f0"/>
  <circle cx="496" cy="324" r="5" fill="#16a34a"/>
  <text x="512" y="328" font-size="12" font-weight="600" fill="#1e293b">webapp-frontend</text>
  <text x="864" y="328" text-anchor="end" font-size="11" fill="#64748b">2h ago</text>
  <line x1="486" y1="344" x2="864" y2="344" stroke="#e2e8f0"/>
  <circle cx="496" cy="372" r="5" fill="#16a34a"/>
  <text x="512" y="376" font-size="12" font-weight="600" fill="#1e293b">api-service</text>
  <text x="864" y="376" text-anchor="end" font-size="11" fill="#64748b">1d ago</text>
  <line x1="486" y1="392" x2="864" y2="392" stroke="#e2e8f0"/>
  <circle cx="496" cy="420" r="5" fill="#dc2626"/>
  <text x="512" y="424" font-size="12" font-weight="600" fill="#1e293b">data-pipeline</text>
  <text x="864" y="424" text-anchor="end" font-size="11" fill="#dc2626">failure · 401</text>
</svg>
