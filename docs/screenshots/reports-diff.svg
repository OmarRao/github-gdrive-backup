<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="topbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="900" height="500" fill="#f8fafc"/>
  <rect x="0" y="0" width="900" height="4" fill="url(#topbar)"/>
  <rect x="0" y="4" width="900" height="44" fill="#ffffff"/>
  <text x="28" y="32" font-size="12" fill="#64748b">Backup</text>
  <text x="100" y="32" font-size="12" fill="#64748b">Restore</text>
  <text x="177" y="32" font-size="14" font-weight="700" fill="#1e293b">Reports</text>
  <text x="265" y="32" font-size="12" fill="#64748b">Settings</text>
  <circle cx="858" cy="26" r="12" fill="#2563eb"/>
  <text x="858" y="30" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">OR</text>
  <line x1="0" y1="48" x2="900" y2="48" stroke="#e2e8f0"/>

  <!-- Card: Session Diff -->
  <rect x="28" y="64" width="844" height="408" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="48" y="94" font-size="14" font-weight="700" fill="#1e293b">Session Diff</text>
  <text x="48" y="110" font-size="11" fill="#64748b">Compare two backup sessions to see what changed</text>
  <line x1="48" y1="122" x2="852" y2="122" stroke="#e2e8f0"/>

  <!-- Dropdowns row -->
  <text x="48" y="148" font-size="11" font-weight="600" fill="#64748b">Session A (older)</text>
  <rect x="48" y="156" width="310" height="34" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="62" y="178" font-size="12" fill="#1e293b">2026-06-25 02:00</text>
  <path d="M336 169 l5 6 l5 -6" stroke="#64748b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <text x="386" y="148" font-size="11" font-weight="600" fill="#64748b">Session B (newer)</text>
  <rect x="386" y="156" width="310" height="34" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="178" font-size="12" fill="#1e293b">2026-06-26 02:00</text>
  <path d="M674 169 l5 6 l5 -6" stroke="#64748b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <rect x="714" y="156" width="110" height="34" rx="8" fill="#4ade80"/>
  <text x="769" y="178" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Compare</text>

  <!-- Summary badges -->
  <rect x="48" y="210" width="72" height="22" rx="11" fill="#dcfce7" stroke="#4ade80"/>
  <text x="84" y="225" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">+1 added</text>
  <rect x="130" y="210" width="82" height="22" rx="11" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="171" y="225" text-anchor="middle" font-size="11" font-weight="700" fill="#b91c1c">0 removed</text>
  <rect x="222" y="210" width="86" height="22" rx="11" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="265" y="225" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">3 changed</text>
  <text x="318" y="225" font-size="12" fill="#64748b">Total delta: +5.5 MB</text>

  <!-- Table header -->
  <rect x="48" y="244" width="804" height="28" fill="#f8fafc" rx="4"/>
  <text x="62" y="262" font-size="11" font-weight="600" fill="#64748b">REPOSITORY</text>
  <text x="280" y="262" font-size="11" font-weight="600" fill="#64748b">CHANGE</text>
  <text x="430" y="262" font-size="11" font-weight="600" fill="#64748b">SIZE A</text>
  <text x="560" y="262" font-size="11" font-weight="600" fill="#64748b">SIZE B</text>
  <text x="700" y="262" font-size="11" font-weight="600" fill="#64748b">DELTA</text>

  <!-- Rows -->
  <line x1="48" y1="272" x2="852" y2="272" stroke="#e2e8f0"/>
  <text x="62" y="292" font-size="12" fill="#1e293b">webapp-frontend</text>
  <text x="280" y="292" font-size="12" font-weight="600" fill="#166534">↑ +5%</text>
  <text x="430" y="292" font-size="12" fill="#64748b">40.0 MB</text>
  <text x="560" y="292" font-size="12" fill="#64748b">42.0 MB</text>
  <text x="700" y="292" font-size="12" fill="#166534">+2.0 MB</text>
  <line x1="48" y1="304" x2="852" y2="304" stroke="#e2e8f0"/>

  <text x="62" y="324" font-size="12" fill="#1e293b">api-service</text>
  <text x="280" y="324" font-size="12" font-weight="600" fill="#166534">↑ +3%</text>
  <text x="430" y="324" font-size="12" fill="#64748b">17.5 MB</text>
  <text x="560" y="324" font-size="12" fill="#64748b">18.0 MB</text>
  <text x="700" y="324" font-size="12" fill="#166534">+0.5 MB</text>
  <line x1="48" y1="336" x2="852" y2="336" stroke="#e2e8f0"/>

  <text x="62" y="356" font-size="12" fill="#1e293b">mobile-app</text>
  <text x="280" y="356" font-size="12" font-weight="600" fill="#64748b">—</text>
  <text x="430" y="356" font-size="12" fill="#64748b">31.0 MB</text>
  <text x="560" y="356" font-size="12" fill="#64748b">31.0 MB</text>
  <text x="700" y="356" font-size="12" fill="#64748b">—</text>
  <line x1="48" y1="368" x2="852" y2="368" stroke="#e2e8f0"/>

  <text x="62" y="388" font-size="12" fill="#1e293b">infrastructure</text>
  <text x="280" y="388" font-size="12" font-weight="600" fill="#64748b">—</text>
  <text x="430" y="388" font-size="12" fill="#64748b">9.5 MB</text>
  <text x="560" y="388" font-size="12" fill="#64748b">9.5 MB</text>
  <text x="700" y="388" font-size="12" fill="#64748b">—</text>
  <line x1="48" y1="400" x2="852" y2="400" stroke="#e2e8f0"/>

  <text x="62" y="420" font-size="12" fill="#1e293b">data-pipeline</text>
  <text x="280" y="420" font-size="12" font-weight="600" fill="#166534">➕ Added</text>
  <text x="430" y="420" font-size="12" fill="#94a3b8">—</text>
  <text x="560" y="420" font-size="12" fill="#64748b">25.0 MB</text>
  <text x="700" y="420" font-size="12" fill="#166534">+25.0 MB</text>
  <line x1="48" y1="432" x2="852" y2="432" stroke="#e2e8f0"/>
</svg>
