  <text x="580" y="87" font-size="11" font-weight="600" fill="#64748b">DURATION</text>
  <text x="720" y="87" font-size="11" font-weight="600" fill="#64748b">OUTPUT</text>
  <line x1="48" y1="100" x2="852" y2="100" stroke="#e2e8f0"/>

  <!-- Step 1: Checkout -->
  <circle cx="62" cy="126" r="5" fill="#4ade80"/>
  <text x="80" y="130" font-size="12" font-weight="600" fill="#1e293b">Checkout</text>
  <rect x="390" y="115" width="62" height="20" rx="10" fill="#dcfce7" stroke="#4ade80"/>
  <text x="421" y="129" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">passed</text>
  <text x="580" y="130" font-size="12" fill="#64748b">1s</text>
  <text x="720" y="130" font-size="11" fill="#94a3b8">actions/checkout@v4</text>
  <line x1="48" y1="143" x2="852" y2="143" stroke="#e2e8f0"/>

  <!-- Step 2: Node setup -->
  <circle cx="62" cy="165" r="5" fill="#4ade80"/>
  <text x="80" y="169" font-size="12" font-weight="600" fill="#1e293b">Set up Node.js 22</text>
  <rect x="390" y="154" width="62" height="20" rx="10" fill="#dcfce7" stroke="#4ade80"/>
  <text x="421" y="168" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">passed</text>
  <text x="580" y="169" font-size="12" fill="#64748b">4s</text>
  <text x="720" y="169" font-size="11" fill="#94a3b8">cache: npm</text>
  <line x1="48" y1="182" x2="852" y2="182" stroke="#e2e8f0"/>

  <!-- Step 3: npm ci -->
  <circle cx="62" cy="204" r="5" fill="#4ade80"/>
