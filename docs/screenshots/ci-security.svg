  <text x="421" y="402" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">passed</text>
  <text x="580" y="403" font-size="12" fill="#64748b">8s</text>
  <text x="720" y="403" font-size="11" fill="#4ade80">7/7 workflows valid</text>
  <line x1="48" y1="416" x2="852" y2="416" stroke="#e2e8f0"/>

  <!-- Step 9: Gitleaks -->
  <circle cx="62" cy="438" r="5" fill="#4ade80"/>
  <text x="80" y="442" font-size="12" font-weight="600" fill="#1e293b">Secret scan (Gitleaks)</text>
  <rect x="390" y="427" width="62" height="20" rx="10" fill="#dcfce7" stroke="#4ade80"/>
  <text x="421" y="441" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">passed</text>
  <text x="580" y="442" font-size="12" fill="#64748b">11s</text>
  <text x="720" y="442" font-size="11" fill="#4ade80">No secrets detected</text>

  <!-- Total badge -->
  <rect x="680" y="458" width="192" height="6" rx="3" fill="#dcfce7"/>
  <text x="776" y="484" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">All checks passed · 58s total</text>
</svg>
