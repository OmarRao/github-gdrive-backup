  <rect x="390" y="310" width="62" height="20" rx="10" fill="#dcfce7" stroke="#4ade80"/>
  <text x="421" y="324" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">passed</text>
  <text x="580" y="325" font-size="12" fill="#64748b">7s</text>
  <text x="720" y="325" font-size="11" fill="#4ade80">25/25 tests · 3 suites</text>
  <line x1="48" y1="338" x2="852" y2="338" stroke="#e2e8f0"/>

  <!-- Step 7: npm audit -->
  <circle cx="62" cy="360" r="5" fill="#4ade80"/>
  <text x="80" y="364" font-size="12" font-weight="600" fill="#1e293b">Security audit (npm audit)</text>
  <rect x="390" y="349" width="62" height="20" rx="10" fill="#dcfce7" stroke="#4ade80"/>
