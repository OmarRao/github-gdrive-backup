  <rect x="390" y="193" width="62" height="20" rx="10" fill="#dcfce7" stroke="#4ade80"/>
  <text x="421" y="207" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">passed</text>
  <text x="580" y="208" font-size="12" fill="#64748b">18s</text>
  <text x="720" y="208" font-size="11" fill="#94a3b8">npm ci</text>
  <line x1="48" y1="221" x2="852" y2="221" stroke="#e2e8f0"/>

  <!-- Step 4: Copyright headers -->
  <circle cx="62" cy="243" r="5" fill="#4ade80"/>
